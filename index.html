<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>6-1 Happy</title>
    <style>
        body {
            margin: 0; padding: 20px;
            background-color: #fffde7; /* 연한 노란색 배경 */
            font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px; text-align: center;
        }
        h1 { color: #fbc02d; margin-bottom: 30px; }
        
        /* 학생 카드 디자인 */
        #student-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .student-card {
            border: 2px solid #ffca28; padding: 20px; 
            border-radius: 20px; cursor: pointer; 
            background: white; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .student-card:hover { transform: translateY(-5px); border-color: #fbc02d; }
        .student-card h2 { margin: 0; font-size: 1.2rem; color: #ff8f00; }
        .student-card p { margin: 5px 0 0; color: #777; font-size: 0.9rem; }

        /* 마이룸 카드 디자인 */
        .my-room-card {
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .info-box {
            background: #fff9c4; padding: 20px; border-radius: 20px;
            border: 2px dashed #ffca28; margin-bottom: 20px; text-align: left;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group button {
            padding: 15px; border-radius: 15px; border: none;
            color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app-content" class="container">
        <h1>🌻 6-1 Happy 숲</h1>
        <div id="student-grid">데이터를 불러오는 중입니다...</div>
    </div>

<script>
    // 선생님이 배포하신 실제 API 주소입니다.
    const API_URL = "https://script.google.com/macros/s/AKfycbwLNJxDMLShsSXledULvzl7lQ8uK98yy70gMgR5wB1CZdnqMaePCPh91iGpWS_l8U0w/exec";
    let allStudents = []; 

    async function loadData() {
        const grid = document.getElementById('student-grid');
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            
            // GAS 구조에 맞춰 students 배열을 가져옵니다.
            allStudents = result.students; 

            grid.innerHTML = allStudents.map(s => `
                <div class="student-card" onclick="enterMyRoom(${s.id})">
                    <h2>👦 ${s.name}</h2>
                    <p><b>LV.${s.lv}</b> | ${s.point}P</p>
                </div>
            `).join('');
        } catch (e) {
            grid.innerHTML = "❌ 연결 실패: " + e.message + "<br>GAS 배포 설정을 확인해주세요.";
        }
    }

    function enterMyRoom(studentId) {
        const s = allStudents.find(item => item.id == studentId);
        const content = document.getElementById('app-content');

        content.innerHTML = `
            <div class="my-room-card">
                <h1 style="color: #ff8f00; margin-bottom: 5px;">🏠 ${s.name}의 Happy 룸</h1>
                <p style="color: #888; margin-bottom: 25px;">우리들의 행복한 성장 기록</p>
                
                <div class="info-box">
                    <p>⭐ <b>현재 레벨:</b> LV.${s.lv}</p>
                    <p>💰 <b>보유 포인트:</b> ${s.point}P</p>
                    <p>🏃 <b>최근 활동:</b> ${s.lastAction || '기록 없음'}</p>
                    <p>🎮 <b>마크 좌표:</b> <span style="color: #2e7d32;">${s.mcCoords || '좌표 미정'}</span></p>
                </div>

                <div class="btn-group">
                    <button style="background: #ffca28;" onclick="alert('과제 제출 기능은 다음 단계에서 연결합니다!')">🎁 과제 제출</button>
                    <button style="background: #4fc3f7;" onclick="alert('작품함 기능은 다음 단계에서 연결합니다!')">🖼️ 내 작품함</button>
                </div>

                <button onclick="location.reload()" style="margin-top: 25px; background: none; border: none; color: #888; text-decoration: underline; cursor: pointer;">← 숲으로 돌아가기</button>
            </div>
        `;
    }

    window.onload = loadData;
</script>
</body>
</html>
