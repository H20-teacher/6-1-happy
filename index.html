<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 도산 6-1 Happy >.<</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), url('./bd.jpg') no-repeat center center fixed; background-size: cover; min-height: 100vh; font-family: "Pretendard", sans-serif; display: flex; flex-direction: column; align-items: center; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.3s ease-out; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. 로그인 화면 -->
    <div id="login-screen">
        <h1 class="text-[#fbc02d] text-3xl font-bold mb-8">🐰 도산 6-1 Happy</h1>
        <div id="login-box" class="bg-white p-8 rounded-[30px] card-shadow w-full max-w-[350px]">
            <div id="loading-status" class="mb-4 text-blue-500 font-bold animate-pulse">📡 서버에서 명단을 불러오는 중...</div>
            <div id="login-controls" class="hidden">
                <p class="text-gray-600 mb-4 font-bold">이름을 입력하고 입장하세요!</p>
                <input type="text" id="login-name" class="w-full p-4 border-2 border-[#ffca28] rounded-xl mb-4 text-center text-lg font-bold outline-none" placeholder="이름 입력" onkeypress="if(event.keyCode==13) handleLogin()">
                <button onclick="handleLogin()" class="w-full p-4 bg-[#ffca28] text-white font-bold rounded-xl hover:bg-[#fbc02d] transition-colors">입장하기</button>
                <p id="login-error" class="text-red-500 mt-4 text-sm font-bold hidden">명단에 없는 이름입니다!</p>
                <button onclick="checkNames()" class="mt-6 text-[0.6rem] text-gray-300 underline">등록된 명단 확인하기</button>
            </div>
        </div>
    </div>

    <!-- 2. 메인 앱 컨텐츠 -->
    <div id="main-app" class="w-full max-w-[500px] text-center p-5 pb-[100px] hidden">
        <h1 class="text-[#fbc02d] text-[1.8rem] mt-5 mb-6 font-bold drop-shadow-[1px_1px_2px_white]">🐰 도산 6-1 Happy >.<</h1>
        
        <div id="tab-home" class="tab-content active-tab">
            <div id="today-date" class="font-bold mb-4"></div>
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow">
                <p class="font-bold text-[#ff8f00]">🌈 지금 나의 기분은?</p>
                <div class="flex justify-around mt-4">
                    <button class="text-4xl hover:scale-110" onclick="sendMood('최고!')">🤩</button>
                    <button class="text-4xl hover:scale-110" onclick="sendMood('좋아요')">😊</button>
                    <button class="text-4xl hover:scale-110" onclick="sendMood('평범해요')">😐</button>
                    <button class="text-4xl hover:scale-110" onclick="sendMood('속상해요')">😢</button>
                    <button class="text-4xl hover:scale-110" onclick="sendMood('화나요')">😡</button>
                </div>
            </div>
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow text-left">
                <h3 class="text-[#fbc02d] font-bold text-lg mb-2">📝 오늘의 학습 문제</h3>
                <div id="lesson-content"></div>
            </div>
        </div>

        <div id="tab-myroom" class="tab-content">
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow">
                <h2 id="my-room-title" class="text-[#ff8f00] text-xl font-bold mb-4">🏠 나의 마이룸</h2>
                <div id="my-stats" class="bg-[#fff9c4] p-5 rounded-[20px] border-2 border-dashed border-[#ffca28] mb-5 text-left"></div>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="uploadFile()">
                <button class="w-full p-4 rounded-xl bg-[#ffca28] text-white font-bold" onclick="document.getElementById('fileInput').click()">🎁 개인 과제 제출하기</button>
            </div>
        </div>

        <div id="tab-explore" class="tab-content">
            <div id="explore-list">
                <p class="font-bold mb-4">🌳 우리 반 친구들 둘러보기</p>
                <div id="friends-grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="friend-detail" class="hidden">
                <div class="bg-white/90 p-5 rounded-[25px] card-shadow">
                    <h2 id="friend-name" class="text-[#ff8f00] text-xl font-bold mb-4"></h2>
                    <div id="friend-stats" class="bg-[#fff9c4] p-5 rounded-[20px] border-2 border-dashed border-[#ffca28] mb-5 text-left"></div>
                    <button class="w-full p-4 rounded-xl bg-gray-200 text-gray-600 font-bold flex items-center justify-center gap-2" onclick="closeFriendRoom()"><i data-lucide="chevron-left"></i> 뒤로 가기</button>
                </div>
            </div>
        </div>

        <!-- 하단 네비게이션 (ID 추가 및 초기 숨김) -->
        <div id="nav-bar" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[500px] bg-white flex justify-around py-3 border-t-2 border-[#fbc02d] z-[1000] hidden">
            <button id="nav-home" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-[#fbc02d]" onclick="showTab('home')"><i data-lucide="home"></i><span>홈</span></button>
            <button id="nav-myroom" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-gray-400" onclick="showTab('myroom')"><i data-lucide="user"></i><span>나의 방</span></button>
            <button id="nav-explore" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-gray-400" onclick="showTab('explore')"><i data-lucide="users"></i><span>친구들</span></button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4eHl5M5jUx7sPyDWg6PogXFkqv7Z8MoYteBKcJPy20MlsY6xZoK5J1iAWZelVBYX/exec";
        
        let currentUser = sessionStorage.getItem('studentName'); 
        let allStudents = [];
        let lessons = [];

        window.onload = () => {
            const now = new Date();
            if(document.getElementById('today-date')) document.getElementById('today-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            loadData();
        };

        async function loadData() {
            const status = document.getElementById('loading-status');
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                allStudents = result.students || [];
                lessons = result.lessons || [];
                status.classList.add('hidden');
                document.getElementById('login-controls').classList.remove('hidden');
                
                // 세션에 이름이 있고 명단에 있으면 자동 입장
                if (currentUser) {
                    const found = allStudents.find(s => s.name.replace(/\s/g, "") === currentUser.replace(/\s/g, ""));
                    if (found) showApp();
                }
            } catch (e) {
                status.innerHTML = `<span class="text-red-500">❌ 서버 연결 실패!</span>`;
            }
        }

        function handleLogin() {
            const inputField = document.getElementById('login-name');
            const inputName = inputField.value.trim();
            
            if (!inputName) return alert("이름을 입력해 주세요!");

            // 모든 공백을 제거하고 비교하는 강력한 로직
            const student = allStudents.find(s => {
                const cleanSheetName = s.name.toString().replace(/\s/g, "");
                const cleanInputName = inputName.replace(/\s/g, "");
                return cleanSheetName === cleanInputName;
            });

            if (student) {
                currentUser = student.name; // 시트에 저장된 정확한 이름 사용
                sessionStorage.setItem('studentName', currentUser);
                showApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                // 디버깅을 위해 콘솔에 출력 (F12 눌러서 확인 가능)
                console.log("입력값:", inputName);
                console.log("명단:", allStudents.map(s => s.name));
            }
        }

        function checkNames() {
            if (allStudents.length === 0) return alert("아직 명단을 불러오지 못했습니다.");
            alert("등록된 명단:\n" + allStudents.map(s => `[${s.name}]`).join(", "));
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('nav-bar').classList.remove('hidden');
            renderAll();
            lucide.createIcons();
        }

        function renderAll() {
            const today = new Date().toISOString().split('T')[0];
            const lesson = lessons.find(l => l.date === today);
            const lessonDiv = document.getElementById('lesson-content');
            if (lesson) {
                lessonDiv.innerHTML = `<p class="text-gray-700 whitespace-pre-wrap">${lesson.content}</p>`;
                if (lesson.link) lessonDiv.innerHTML += `<a href="${lesson.link}" target="_blank" class="inline-flex items-center gap-1 mt-3 text-[#ff8f00] font-bold hover:underline"><i data-lucide="external-link" size="16"></i> 학습 링크 바로가기</a>`;
            } else {
                lessonDiv.innerHTML = `<p class="text-gray-500 italic">학습 문제가 없습니다.</p>`;
            }

            const me = allStudents.find(s => s.name.replace(/\s/g, "") === currentUser.replace(/\s/g, ""));
            if (me) {
                document.getElementById('my-room-title').innerText = `🏠 ${me.name}의 마이룸`;
                document.getElementById('my-stats').innerHTML = `<p class="mb-2">⭐ <b>레벨:</b> LV.${me.lv}</p><p class="mb-2">💰 <b>포인트:</b> ${me.point}P</p><p>🎮 <b>마크 좌표:</b> ${me.mcCoords || '미정'}</p>`;
            }

            const grid = document.getElementById('friends-grid');
            grid.innerHTML = allStudents.filter(s => s.name.replace(/\s/g, "") !== currentUser.replace(/\s/g, "")).map(s => `
                <div class="bg-white border-2 border-[#ffca28] p-4 rounded-2xl cursor-pointer" onclick="viewFriend('${s.name}')">
                    <div class="text-2xl">🌳</div><div class="font-bold mt-1">${s.name}</div><div class="text-sm text-gray-400">LV.${s.lv}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.add('active-tab');
            document.querySelectorAll('#nav-bar button').forEach(b => {
                b.classList.remove('text-[#fbc02d]');
                b.classList.add('text-gray-400');
            });
            document.getElementById('nav-' + tabName).classList.replace('text-gray-400', 'text-[#fbc02d]');
            if(tabName === 'explore') closeFriendRoom();
        }

        function viewFriend(name) {
            const friend = allStudents.find(s => s.name === name);
            if (!friend) return;
            document.getElementById('explore-list').classList.add('hidden');
            document.getElementById('friend-detail').classList.remove('hidden');
            document.getElementById('friend-name').innerText = `🏠 ${friend.name}의 공간`;
            document.getElementById('friend-stats').innerHTML = `<p class="mb-2">⭐ <b>레벨:</b> LV.${friend.lv}</p><p class="mb-2">💰 <b>포인트:</b> ${friend.point}P</p><p>🎮 <b>마크 좌표:</b> ${friend.mcCoords || '미정'}</p>`;
            lucide.createIcons();
        }

        function closeFriendRoom() { document.getElementById('explore-list').classList.remove('hidden'); document.getElementById('friend-detail').classList.add('hidden'); }

        async function sendMood(mood) {
            const today = new Date().toLocaleDateString();
            if (localStorage.getItem('done_' + currentUser) === today) return alert("이미 오늘 기분을 기록했어!");
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "mood", name: currentUser, mood }) });
                localStorage.setItem('done_' + currentUser, today);
                alert(`✅ 기분 저장 완료!`);
            } catch (e) { alert("저장 실패"); }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    await fetch(API_URL, { method: "POST", body: JSON.stringify({ base64, mimeType: file.type, fileName: currentUser + "_" + file.name }) });
                    alert("✅ 과제 제출 성공!");
                } catch (e) { alert("제출 실패"); }
            };
        }
    </script>
</body>
</html>
