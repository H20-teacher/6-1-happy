<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 도산 6-1 Happy >.<</title>
    <style>
        /* 기존 스타일 유지 및 로그인 UI 추가 */
        body { margin: 0; padding: 0; background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), url('./bd.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Pretendard', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; text-align: center; padding: 20px; padding-bottom: 100px; }
        h1 { color: #fbc02d; text-shadow: 1px 1px 2px white; margin-top: 20px; }
        
        /* 로그인 오버레이 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #login-overlay input { padding: 15px; border-radius: 15px; border: 2px solid #fbc02d; font-size: 1.1rem; width: 200px; text-align: center; margin-bottom: 10px; }
        #login-overlay button { padding: 12px 30px; border-radius: 15px; border: none; background: #fbc02d; color: white; font-weight: bold; cursor: pointer; }

        .mood-section, .lesson-box { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .mood-buttons { display: flex; justify-content: space-around; margin-top: 15px; }
        .mood-btn { font-size: 2.2rem; cursor: pointer; border: none; background: none; transition: 0.2s; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #fbc02d; z-index: 1000; }
        .nav-item { cursor: pointer; text-align: center; color: #bbb; flex: 1; font-weight: bold; }
        .nav-item.active { color: #fbc02d; }
        .my-room-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .info-box { background: #fff9c4; padding: 20px; border-radius: 20px; border: 2px dashed #ffca28; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-overlay" style="display:none;">
        <h2 style="color:#ff8f00;">🐰 안녕! 너의 이름은?</h2>
        <input type="text" id="user-name" placeholder="이름을 입력해줘">
        <button onclick="login()">입장하기</button>
    </div>

    <div class="container" id="main-app">
        <h1>🐰 도산 6-1 Happy >.<</h1>
        <div id="today-date" style="font-weight:bold; margin-bottom:20px;"></div>

        <div id="tab-home">
            <div class="mood-section">
                <p id="welcome-msg" style="margin:0; font-weight:bold; color:#ff8f00;"></p>
                <div class="mood-buttons">
                    <button class="mood-btn" onclick="sendMood('최고!')">🤩</button>
                    <button class="mood-btn" onclick="sendMood('좋아요')">😊</button>
                    <button class="mood-btn" onclick="sendMood('평범해요')">😐</button>
                    <button class="mood-btn" onclick="sendMood('속상해요')">😢</button>
                    <button class="mood-btn" onclick="sendMood('화나요')">😡</button>
                </div>
            </div>
            <div class="lesson-box">
                <h3 style="color:#fbc02d;">📝 오늘의 학습 문제</h3>
                <p>도산 6-1반 친구들, 오늘 하루도 행복하게 보내자!</p>
            </div>
        </div>

        <div id="tab-myroom" style="display:none;">
            <div id="my-room-content">데이터를 불러오는 중...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="showTab('home')">🏠<span>홈</span></div>
        <div class="nav-item" id="nav-myroom" onclick="showTab('myroom')">🌳<span>마이룸</span></div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyZzkwmxOPs2XX3ANYFfY0pRSLzfBfhM31YA_fe7g6egzZ8D7T9HT6VsWL3RJbuyAuJ/exec";
    let currentUser = localStorage.getItem('studentName');

    document.addEventListener("DOMContentLoaded", function() {
        if (!currentUser) {
            document.getElementById('login-overlay').style.display = 'flex';
        } else {
            initApp();
        }
    });

    function login() {
        const name = document.getElementById('user-name').value;
        if (name.trim() === "") return alert("이름을 입력해줘!");
        localStorage.setItem('studentName', name);
        currentUser = name;
        document.getElementById('login-overlay').style.display = 'none';
        initApp();
    }

    function initApp() {
        document.getElementById('welcome-msg').innerText = `🌈 ${currentUser}, 오늘의 기분은?`;
        updateDate();
        loadData();
    }

    function updateDate() {
        const now = new Date();
        document.getElementById('today-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }

    async function sendMood(mood) {
        const today = new Date().toLocaleDateString();
        const lastDate = localStorage.getItem('lastMoodDate');

        if (lastDate === today) {
            return alert("기분은 하루에 한 번만 기록할 수 있어! 내일 또 들려줘 😊");
        }

        alert(currentUser + "야, 기록 중이야. 잠시만 기다려줘!");
        
        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ type: "mood", name: currentUser, mood: mood })
            });
            localStorage.setItem('lastMoodDate', today);
            alert("✅ 오늘 기분 기록 완료! 시트에 저장됐어.");
        } catch (e) {
            alert("❌ 전송 실패! 나중에 다시 시도해줘.");
        }
    }

    function showTab(tabName) {
        document.getElementById('tab-home').style.display = (tabName === 'home') ? 'block' : 'none';
        document.getElementById('tab-myroom').style.display = (tabName === 'myroom') ? 'block' : 'none';
        document.getElementById('nav-home').classList.toggle('active', tabName === 'home');
        document.getElementById('nav-myroom').classList.toggle('active', tabName === 'myroom');
        if(tabName === 'myroom') renderMyRoom();
    }

    let allStudents = [];
    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            allStudents = result.students;
        } catch (e) { console.error("데이터 로드 실패"); }
    }

    function renderMyRoom() {
        const s = allStudents.find(item => item.name === currentUser);
        const container = document.getElementById('my-room-content');
        if (!s) {
            container.innerHTML = `<div class="my-room-card">데이터에 ${currentUser} 이름이 없어 ㅠㅠ</div>`;
            return;
        }
        container.innerHTML = `
            <div class="my-room-card">
                <h2>🏠 ${s.name}의 룸</h2>
                <div class="info-box">
                    <p>⭐ <b>레벨:</b> LV.${s.lv}</p>
                    <p>💰 <b>포인트:</b> ${s.point}P</p>
                    <p>🎮 <b>마크 좌표:</b> ${s.mcCoords || '미정'}</p>
                </div>
                <button onclick="alert('과제 제출 준비 중!')" style="background:#ffca28; border:none; padding:15px; border-radius:15px; color:white; font-weight:bold; cursor:pointer; width:100%;">🎁 과제 제출하기</button>
            </div>
        `;
    }
</script>
</body>
</html>
