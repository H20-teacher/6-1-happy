<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 도산 6-1 Happy >.<</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), url('./bd.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Pretendard', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; text-align: center; padding: 20px; padding-bottom: 100px; }
        h1 { color: #fbc02d; text-shadow: 1px 1px 2px white; margin-top: 10px; font-size: 1.6rem; }
        
        /* 상단 탭 스타일 */
        .tab-menu { display: flex; background: rgba(255,255,255,0.8); border-radius: 50px; margin-bottom: 20px; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #888; transition: 0.3s; }
        .tab-btn.active { background: #fbc02d; color: white; }

        .content-section { display: none; animation: fadeIn 0.3s; }
        .content-section.active { display: block; }

        /* 카드 공통 스타일 */
        .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .student-card { border: 2px solid #ffca28; padding: 18px; border-radius: 22px; cursor: pointer; background: rgba(255, 255, 255, 0.9); transition: 0.2s; }
        .student-card:active { transform: scale(0.95); }
        .student-card h2 { margin: 0; font-size: 1.1rem; color: #ff8f00; }
        .student-card p { margin: 5px 0 0; font-size: 0.8rem; color: #666; }

        /* 마이룸 상세 */
        .room-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-top: 10px; }
        .info-box { background: #fff9c4; padding: 20px; border-radius: 20px; border: 2px dashed #ffca28; margin-bottom: 20px; text-align: left; line-height: 1.7; }
        .mood-buttons { display: flex; justify-content: space-around; margin: 15px 0; }
        .mood-btn { font-size: 2.3rem; cursor: pointer; border: none; background: none; }
        .action-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #ffca28; color: white; font-weight: bold; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐰 도산 6-1 Happy 숲</h1>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('attendance')">🌳 감정출석</button>
            <button class="tab-btn" onclick="switchTab('explore')">🏠 친구룸 구경</button>
        </div>

        <div id="section-attendance" class="content-section active">
            <p style="font-size:0.9rem; color:#444; margin-bottom:15px; font-weight:bold;">👇 자기 이름을 눌러 오늘을 기록해봐!</p>
            <div id="attendance-grid" class="student-grid">데이터 로딩 중...</div>
        </div>

        <div id="section-explore" class="content-section">
            <p style="font-size:0.9rem; color:#444; margin-bottom:15px; font-weight:bold;">👀 친구들은 얼마나 성장했을까?</p>
            <div id="explore-grid" class="student-grid">데이터 로딩 중...</div>
        </div>

        <div id="section-detail" class="content-section">
            <div class="room-card">
                <h2 id="room-owner" style="color: #ff8f00; margin-top:0;"></h2>
                
                <div id="mood-record-area">
                    <p style="font-weight:bold; font-size:0.9rem;">🌈 오늘 기분 기록하기</p>
                    <div class="mood-buttons">
                        <button class="mood-btn" onclick="sendMood('최고!')">🤩</button>
                        <button class="mood-btn" onclick="sendMood('좋아요')">😊</button>
                        <button class="mood-btn" onclick="sendMood('평범해요')">😐</button>
                        <button class="mood-btn" onclick="sendMood('속상해요')">😢</button>
                        <button class="mood-btn" onclick="sendMood('화나요')">😡</button>
                    </div>
                </div>

                <div class="info-box" id="student-info"></div>

                <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="uploadFile()">
                <button id="upload-btn" class="action-btn" onclick="document.getElementById('fileInput').click()">🎁 과제 제출하기</button>
                
                <button style="margin-top:20px; color:#888; background:none; border:none; text-decoration:underline; cursor:pointer;" onclick="goBack()">목록으로 돌아가기</button>
            </div>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxpt56cC1s0VQOSRDcUXs8tgTH7gzgwcTjTk-QbxotvO0azKdvZp_5U5SRwFc0_kMTe/exec";
    let allStudents = [];
    let selectedStudent = null;
    let currentTab = 'attendance';
    const fruits = ['🍎', '🍊', '🍋', '🍉', '🍇', '🍓', '🍑', '🍒', '🥝', '🍍'];

    document.addEventListener("DOMContentLoaded", loadData);

    async function loadData() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            allStudents = result.students;
            renderAllGrids();
        } catch (e) { console.error("데이터 실패"); }
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
        
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${tab}`).classList.add('active');
    }

    function renderAllGrids() {
        const attGrid = document.getElementById('attendance-grid');
        const expGrid = document.getElementById('explore-grid');
        
        const html = allStudents.map((s, index) => `
            <div class="student-card" onclick="enterRoom(${s.id})">
                <h2>${fruits[index % fruits.length]} ${s.name}</h2>
                <p>LV.${s.lv} | ${s.point}P</p>
            </div>
        `).join('');

        attGrid.innerHTML = html;
        expGrid.innerHTML = html;
    }

    function enterRoom(id) {
        selectedStudent = allStudents.find(s => s.id == id);
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        const detail = document.getElementById('section-detail');
        detail.classList.add('active');

        document.getElementById('room-owner').innerText = `🏠 ${selectedStudent.name}의 룸`;
        document.getElementById('student-info').innerHTML = `
            <p>⭐ <b>레벨:</b> LV.${selectedStudent.lv}</p>
            <p>💰 <b>보유 포인트:</b> ${selectedStudent.point}P</p>
            <p>🎮 <b>마크 좌표:</b> <span style="color:#2e7d32;">${selectedStudent.mcCoords || '미정'}</span></p>
        `;

        // 구경 모드일 때는 기분 기록과 업로드 버튼을 숨깁니다.
        const isExplore = (currentTab === 'explore');
        document.getElementById('mood-record-area').style.display = isExplore ? 'none' : 'block';
        document.getElementById('upload-btn').style.display = isExplore ? 'none' : 'block';
    }

    function goBack() { switchTab(currentTab); }

    async function sendMood(mood) {
        const today = new Date().toLocaleDateString();
        if (localStorage.getItem('done_' + selectedStudent.name) === today) return alert("이미 기록했어!");
        alert("기록 중...");
        try {
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "mood", name: selectedStudent.name, mood: mood }) });
            localStorage.setItem('done_' + selectedStudent.name, today);
            alert("✅ 완료!");
        } catch (e) { alert("실패!"); }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ base64: base64, mimeType: file.type, fileName: selectedStudent.name + "_" + file.name }) });
                alert("✅ 전송 성공!");
            } catch (e) { alert("❌ 실패!"); }
        };
    }
</script>
</body>
</html>
