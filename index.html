<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>6-1 Happy</title>
    <style>
        body {
            margin: 0; padding: 20px;
            /* 배경 이미지 설정: ID를 넣고 투명도를 조절했습니다. */
            background: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)), 
                        url('https://drive.google.com/uc?id=14bqoIAnz5AN3W4TSgvjGIUKI24HlZgl3') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Pretendard', sans-serif;
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 500px; text-align: center;
        }
        /* 제목이 배경에서도 잘 보이도록 그림자를 넣었습니다. */
        h1 { color: #fbc02d; margin-bottom: 30px; text-shadow: 1px 1px 2px white; }
        
        #student-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        .student-card {
            border: 2px solid #ffca28; padding: 20px; 
            border-radius: 20px; cursor: pointer; 
            background: rgba(255, 255, 255, 0.9); /* 카드를 약간 투명하게 하여 배경과 어우러지게 함 */
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .student-card:hover { transform: translateY(-5px); background: white; }
        .student-card h2 { margin: 0; font-size: 1.2rem; color: #ff8f00; }
        .student-card p { margin: 5px 0 0; color: #777; font-size: 0.9rem; }

        .my-room-card {
            background: white; padding: 30px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .info-box {
            background: #fff9c4; padding: 20px; border-radius: 20px;
            border: 2px dashed #ffca28; margin-bottom: 20px; text-align: left;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group button {
            padding: 15px; border-radius: 15px; border: none;
            color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app-content" class="container">
        <h1>🌻 6-1 Happy 숲</h1>
        <div id="student-grid">데이터를 불러오는 중...</div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzQzDoH1oOmyWxNNECHXqh1TCGCV5aVt4M5jKUOlY7HGl5y9JckQ112JoKqyFfhEn7V/exec";
    let allStudents = []; 

    async function loadData() {
        const grid = document.getElementById('student-grid');
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            allStudents = result.students; 

            grid.innerHTML = allStudents.map(s => `
                <div class="student-card" onclick="enterMyRoom(${s.id})">
                    <h2>👦 ${s.name}</h2>
                    <p><b>LV.${s.lv}</b> | ${s.point}P</p>
                </div>
            `).join('');
        } catch (e) {
            grid.innerHTML = "<div style='background:white; padding:20px; border-radius:20px;'>❌ 연결 실패: " + e.message + "</div>";
        }
    }

function enterMyRoom(studentId) {
    const s = allStudents.find(item => item.id == studentId);
    const content = document.getElementById('app-content');
    
    content.innerHTML = `
        <div class="my-room-card">
            <h1 style="color: #ff8f00; margin-bottom: 5px; text-shadow:none;">🏠 ${s.name}의 Happy 룸</h1>
            <p style="color: #888; margin-bottom: 25px;">우리들의 행복한 성장 기록</p>
            
            <div class="info-box">
                <p>⭐ <b>현재 레벨:</b> LV.${s.lv}</p>
                <p>💰 <b>보유 포인트:</b> ${s.point}P</p>
                <p>🏃 <b>최근 활동:</b> ${s.lastAction || '기록 없음'}</p>
                <p>🎮 <b>마크 좌표:</b> <span style="color: #2e7d32;">${s.mcCoords || '좌표 미정'}</span></p>
            </div>

            <div class="btn-group">
                <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="uploadFile('${s.name}')">
                
                <button style="background: #ffca28;" onclick="document.getElementById('fileInput').click()">🎁 과제 제출</button>
                <button style="background: #4fc3f7;" onclick="alert('작품함 준비 중!')">🖼️ 내 작품함</button>
            </div>

            <button onclick="location.reload()" style="margin-top: 25px; background: none; border: none; color: #888; text-decoration: underline; cursor: pointer;">← 숲으로 돌아가기</button>
        </div>
    `;
}
    
    // 파일을 서버(GAS)로 전송하는 메인 엔진
async function uploadFile(studentName) {
    const fileInput = document.getElementById('fileInput');
    const file = fileInput.files[0];
    if (!file) return;

    // 로딩 표시 (아이들이 중복 클릭하지 않게 안내)
    alert(studentName + " 어린이, 사진을 선생님께 보내고 있어요. 잠시만 기다려요!");

    const reader = new FileReader();
    reader.readAsDataURL(file); // 파일을 데이터 형태로 읽기
    reader.onload = async () => {
        const base64 = reader.result.split(',')[1]; // 순수 파일 데이터만 추출
        
        // 전송할 데이터 묶음 만들기
        const payload = {
            base64: base64,
            mimeType: file.type,
            fileName: studentName + "_" + new Date().getTime() + "_" + file.name,
            studentName: studentName
        };

        try {
            // [중요] 아까 만든 API_URL로 POST 요청을 보냅니다.
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await response.text();
            alert("✅ 성공: " + result);
        } catch (e) {
            console.error("업로드 에러:", e);
            alert("❌ 전송 실패! 네트워크를 확인하거나 선생님께 말씀드려요.");
        }
    };
}
    window.onload = loadData;
</script>
</body>
</html>
