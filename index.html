<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 도산 6-1 Happy >.<</title>
    
    <!-- 필수 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                        url('./bd.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: "Pretendard", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.3s ease-out; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 class="text-[#fbc02d] text-3xl font-bold mb-8">🐰 도산 6-1 Happy</h1>
        <div id="login-box" class="bg-white p-8 rounded-[30px] card-shadow w-full max-w-[350px]">
            <div id="loading-status" class="mb-4 text-blue-500 font-bold animate-pulse">📡 서버에서 명단을 불러오는 중...</div>
            
            <div id="login-controls" class="hidden">
                <p class="text-gray-600 mb-4 font-bold">이름을 입력하고 입장하세요!</p>
                <input type="text" id="login-name" class="w-full p-4 border-2 border-[#ffca28] rounded-xl mb-4 text-center text-lg font-bold outline-none" placeholder="이름 입력">
                <button onclick="handleLogin()" class="w-full p-4 bg-[#ffca28] text-white font-bold rounded-xl hover:bg-[#fbc02d] transition-colors">입장하기</button>
                <p id="login-error" class="text-red-500 mt-4 text-sm font-bold hidden">명단에 없는 이름입니다!</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="w-full max-w-[500px] text-center p-5 pb-[100px] hidden">
        <h1 class="text-[#fbc02d] text-[1.8rem] mt-5 mb-6 font-bold drop-shadow-[1px_1px_2px_white]">
            🐰 도산 6-1 Happy &gt;.&lt;
        </h1>

        <div id="tab-home" class="tab-content active-tab">
            <div id="today-date" class="font-bold mb-4">날짜 불러오는 중...</div>
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow">
                <p class="font-bold text-[#ff8f00]">🌈 지금 나의 기분은?</p>
                <div class="flex justify-around mt-4">
                    <button class="text-4xl hover:scale-110 transition-transform" onclick="sendMood('최고!')">🤩</button>
                    <button class="text-4xl hover:scale-110 transition-transform" onclick="sendMood('좋아요')">😊</button>
                    <button class="text-4xl hover:scale-110 transition-transform" onclick="sendMood('평범해요')">😐</button>
                    <button class="text-4xl hover:scale-110 transition-transform" onclick="sendMood('속상해요')">😢</button>
                    <button class="text-4xl hover:scale-110 transition-transform" onclick="sendMood('화나요')">😡</button>
                </div>
            </div>
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow text-left">
                <h3 class="text-[#fbc02d] font-bold text-lg mb-2">📝 오늘의 학습 문제</h3>
                <div id="lesson-content">
                    <p class="text-gray-500 italic">학습 문제를 불러오는 중입니다...</p>
                </div>
            </div>
        </div>

        <div id="tab-myroom" class="tab-content">
            <div class="bg-white/90 p-5 rounded-[25px] mb-5 card-shadow">
                <h2 id="my-room-title" class="text-[#ff8f00] text-xl font-bold mb-4">🏠 나의 마이룸</h2>
                <div id="my-stats" class="bg-[#fff9c4] p-5 rounded-[20px] border-2 border-dashed border-[#ffca28] mb-5 text-left">
                    데이터를 불러오는 중...
                </div>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="uploadFile()">
                <button class="w-full p-4 rounded-xl bg-[#ffca28] text-white font-bold" onclick="document.getElementById('fileInput').click()">🎁 개인 과제 제출하기</button>
            </div>
        </div>

        <div id="tab-explore" class="tab-content">
            <div id="explore-list">
                <p class="font-bold mb-4">🌳 우리 반 친구들 둘러보기</p>
                <div id="friends-grid" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div id="friend-detail" class="hidden">
                <div class="bg-white/90 p-5 rounded-[25px] card-shadow">
                    <h2 id="friend-name" class="text-[#ff8f00] text-xl font-bold mb-4"></h2>
                    <div id="friend-stats" class="bg-[#fff9c4] p-5 rounded-[20px] border-2 border-dashed border-[#ffca28] mb-5 text-left"></div>
                    <button class="w-full p-4 rounded-xl bg-gray-200 text-gray-600 font-bold flex items-center justify-center gap-2" onclick="closeFriendRoom()">
                        <i data-lucide="chevron-left"></i> 뒤로 가기
                    </button>
                </div>
            </div>
        </div>

        <p class="text-[0.7rem] text-gray-500 mt-8 leading-relaxed px-4">
            본 플랫폼에 사용된 시각 자료는 스튜디오 지브리(Studio Ghibli)에서 공식적으로 허용한 '상식적인 범위 내의 교육적 활용' 가이드라인을 준수하며, 출처를 명확히 표기함.
        </p>
    </div>

    <div id="nav-bar" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[500px] bg-white flex justify-around py-3 border-t-2 border-[#fbc02d] z-[1000] hidden">
        <button id="nav-home" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-[#fbc02d]" onclick="showTab('home')">
            <i data-lucide="home"></i><span>홈</span>
        </button>
        <button id="nav-myroom" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-gray-400" onclick="showTab('myroom')">
            <i data-lucide="user"></i><span>나의 방</span>
        </button>
        <button id="nav-explore" class="flex-1 flex flex-col items-center gap-1 font-bold text-xs text-gray-400" onclick="showTab('explore')">
            <i data-lucide="users"></i><span>친구들</span>
        </button>
    </div>

    <script>
        // 선생님의 실제 API 주소 적용
        const API_URL = "https://script.google.com/macros/s/AKfycbxl4eHl5M5jUx7sPyDWg6PogXFkqv7Z8MoYteBKcJPy20MlsY6xZoK5J1iAWZelVBYX/exec";
        
        let currentUser = sessionStorage.getItem('studentName'); 
        let allStudents = [];
        let lessons = [];

        window.onload = () => {
            updateDate();
            loadData();
        };

        function updateDate() {
            const now = new Date();
            document.getElementById('today-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }

        async function loadData() {
            const status = document.getElementById('loading-status');
            try {
                // [수정됨] 주소가 설정되었는지 확인하는 로직 정상화
                if (API_URL.includes("YOUR_GOOGLE")) {
                    status.innerHTML = `<span class="text-red-500">❌ API 주소가 설정되지 않았습니다!</span>`;
                    return;
                }
                
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.error) {
                    status.innerHTML = `<span class="text-red-500">❌ 오류: ${result.error}</span>`;
                    return;
                }

                allStudents = result.students || [];
                lessons = result.lessons || [];

                if (allStudents.length === 0) {
                    status.innerHTML = `<span class="text-red-500">⚠️ 명단이 비어있습니다. Main_DB 시트를 확인하세요!</span>`;
                } else {
                    status.classList.add('hidden');
                    document.getElementById('login-controls').classList.remove('hidden');
                    if (currentUser && allStudents.some(s => s.name === currentUser)) {
                        showApp();
                    }
                }
            } catch (e) {
                status.innerHTML = `<span class="text-red-500">❌ 서버 연결 실패!<br>주소나 권한 설정을 확인하세요.</span>`;
                console.error(e);
            }
        }

        function handleLogin() {
            const inputName = document.getElementById('login-name').value.trim();
            const student = allStudents.find(s => s.name === inputName);
            
            if (student) {
                currentUser = inputName;
                sessionStorage.setItem('studentName', currentUser);
                showApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('nav-bar').classList.remove('hidden');
            renderAll();
            lucide.createIcons();
        }

        function renderAll() {
            const today = new Date().toISOString().split('T')[0];
            const lesson = lessons.find(l => l.date === today);
            const lessonDiv = document.getElementById('lesson-content');
            if (lesson) {
                lessonDiv.innerHTML = `<p class="text-gray-700 whitespace-pre-wrap">${lesson.content}</p>`;
                if (lesson.link) {
                    lessonDiv.innerHTML += `<a href="${lesson.link}" target="_blank" class="inline-flex items-center gap-1 mt-3 text-[#ff8f00] font-bold hover:underline"><i data-lucide="external-link" size="16"></i> 학습 링크 바로가기</a>`;
                }
            } else {
                lessonDiv.innerHTML = `<p class="text-gray-500 italic">오늘은 등록된 학습 문제가 없습니다.</p>`;
            }

            const me = allStudents.find(s => s.name === currentUser);
            if (me) {
                document.getElementById('my-room-title').innerText = `🏠 ${me.name}의 마이룸`;
                document.getElementById('my-stats').innerHTML = `
                    <p class="mb-2">⭐ <b>레벨:</b> LV.${me.lv}</p>
                    <p class="mb-2">💰 <b>포인트:</b> ${me.point}P</p>
                    <p>🎮 <b>마크 좌표:</b> ${me.mcCoords || '미정'}</p>
                `;
            }

            const grid = document.getElementById('friends-grid');
            grid.innerHTML = allStudents.filter(s => s.name !== currentUser).map(s => `
                <div class="bg-white border-2 border-[#ffca28] p-4 rounded-2xl cursor-pointer transition-transform hover:scale-[1.02]" onclick="viewFriend('${s.name}')">
                    <div class="text-2xl">🌳</div>
                    <div class="font-bold mt-1">${s.name}</div>
                    <div class="text-sm text-gray-400">LV.${s.lv}</div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById('tab-' + tabName).classList.add('active-tab');
            document.querySelectorAll('#nav-bar button').forEach(b => {
                b.classList.remove('text-[#fbc02d]');
                b.classList.add('text-gray-400');
            });
            document.getElementById('nav-' + tabName).classList.replace('text-gray-400', 'text-[#fbc02d]');
            if(tabName === 'explore') closeFriendRoom();
        }

        function viewFriend(name) {
            const friend = allStudents.find(s => s.name === name);
            document.getElementById('explore-list').classList.add('hidden');
            document.getElementById('friend-detail').classList.remove('hidden');
            document.getElementById('friend-name').innerText = `🏠 ${friend.name}의 공간`;
            document.getElementById('friend-stats').innerHTML = `
                <p class="mb-2">⭐ <b>레벨:</b> LV.${friend.lv}</p>
                <p class="mb-2">💰 <b>포인트:</b> ${friend.point}P</p>
                <p>🎮 <b>마크 좌표:</b> ${friend.mcCoords || '미정'}</p>
                <p class="text-[0.8rem] text-gray-500 text-center mt-5">(친구의 방은 구경만 가능해요!)</p>
            `;
            lucide.createIcons();
        }

        function closeFriendRoom() {
            document.getElementById('explore-list').classList.remove('hidden');
            document.getElementById('friend-detail').classList.add('hidden');
        }

        async function sendMood(mood) {
            const today = new Date().toLocaleDateString();
            if (localStorage.getItem('done_' + currentUser) === today) return alert("이미 오늘 기분을 기록했어!");
            try {
                // [수정됨] 테스트 모드 판정 로직 정상화
                if (API_URL.includes("YOUR_GOOGLE")) return alert("테스트 모드입니다.");
                await fetch(API_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ type: "mood", name: currentUser, mood: mood }) 
                });
                localStorage.setItem('done_' + currentUser, today);
                alert(`✅ ${currentUser}의 기분 저장 완료!`);
            } catch (e) { alert("저장 실패"); }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    // [수정됨] 테스트 모드 판정 로직 정상화
                    if (API_URL.includes("YOUR_GOOGLE")) return alert("테스트 모드입니다.");
                    await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            base64: base64, 
                            mimeType: file.type, 
                            fileName: currentUser + "_" + file.name 
                        }) 
                    });
                    alert("✅ 과제 제출 성공!");
                } catch (e) { alert("제출 실패"); }
            };
        }
    </script>
</body>
</html>
